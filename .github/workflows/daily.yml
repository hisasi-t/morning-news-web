name: Generate morning news

on:
  schedule:
    # GitHub Actions無料枠は0/15/30/45分が混雑するので中途半端な分にする
    # 念のため2回トライ：どちらか通れば当日朝の朝刊が間に合う
    - cron: "37 21 * * *"  # 06:37 JST 本命
    - cron: "17 22 * * *"  # 07:17 JST 予備
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate index.html
        run: python news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update morning news ($(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST'))"
            git push
          fi
